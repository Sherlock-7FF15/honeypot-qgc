services:
  qgc:
    build:
      context: ./qgc
      args:
        QGC_APPIMAGE_URL: "https://d176tv9ibo4jno.cloudfront.net/latest/QGroundControl-x86_64.AppImage"
    container_name: qgc
    restart: always

    # NOTE: qgc 本身不对外暴露端口（通过 ui-gateway 转发 noVNC）

    environment:
      - DISPLAY_NUM=:99
      - SCREEN_GEOM=1280x720x24
      - VNC_BIND=0.0.0.0
      - VNC_PORT=5900
      - NOVNC_PORT=6080
      - ENABLE_NOVNC=true

    volumes:
      - ./qgc/data:/data
      - ./qgc/logs:/logs

    mem_limit: 1g
    cpus: 1.0
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=256m
      - /run:rw,noexec,nosuid,size=64m
    security_opt:
      - no-new-privileges:true

    networks:
      - internal_net

  facade:
    build: ./facade
    container_name: facade
    restart: always
    depends_on:
      - qgc

    # 对外暴露 MAVLink 入口（facade）
    ports:
      # add common MAVLink ports and forward all to facade's UDP 14550 listener
      - "14540:14550/udp"
      - "14550:14550/udp"
      - "14560:14550/udp"

    environment:
      - PUBLIC_BIND=0.0.0.0
      - PUBLIC_PORT=14550
      - QGC_HOST=qgc
      - QGC_PORT=14550

      # session idle 超时（秒），超时就写 session_end 并清理映射
      - SESSION_IDLE=300

      # 记录 payload 的预览字节数（避免日志爆炸）
      - PREVIEW_BYTES=96

      # 日志根目录
      - LOG_ROOT=/logs/facade
      - UPLOAD_ROOT=/uploads
      - SESSION_IDLE_IN=60
      - HEARTBEAT_AGG_SEC=5
    volumes:
      - ./logs:/logs
      - ./uploads:/uploads

    networks:
      - internal_net

  ui-gateway:
    image: nginx:1.27-alpine
    container_name: ui-gateway
    restart: always
    depends_on:
      - qgc
    ports:
      - "6080:6080/tcp"
    volumes:
      - ./ui-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs:/logs:rw
    networks:
      - internal_net

  watcher:
    build: ./watcher
    container_name: watcher
    restart: always
    depends_on:
      - qgc
    environment:
      - WATCH_DIRS=/qgc-data/Documents/QGroundControl:/qgc-data/tmp:/qgc-logs
      - WATCHER_LOG=/logs/watcher/events.fs.jsonl
      - UPLOAD_ROOT=/uploads/fs
      - MAX_BYTES=52428800
      - MOD_COOLDOWN_SEC=2.0
      - HASH_ON_MODIFY=true
    volumes:
      - ./qgc/data:/qgc-data:ro
      - ./qgc/logs:/qgc-logs:ro
      - ./logs:/logs:rw
      - ./uploads:/uploads:rw


networks:
  internal_net:
    driver: bridge
